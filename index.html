<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="考核表">
<title>考核表</title>
<style>
:root{
  --bg:#F2F2F7;--card:#FFF;--border:#E5E5EA;--label:#8E8E93;
  --accent:#007AFF;--accent-bg:#E8F0FE;
  --green:#34C759;--red:#FF3B30;--orange:#FF9500;--gold:#FFCC00;--gold-bg:#FFF9E6;
  --nav-h:56px;--hdr-h:52px;--safe-t:env(safe-area-inset-top,0px);--safe-b:env(safe-area-inset-bottom,16px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;font-size:15px;color:#1C1C1E;background:var(--bg)}
button,input,textarea{font-family:inherit;font-size:inherit}
#app{display:flex;flex-direction:column;height:100%;height:100dvh}

/* header */
.hdr{height:calc(var(--hdr-h) + var(--safe-t));padding-top:var(--safe-t);background:var(--card);border-bottom:.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding-left:12px;padding-right:12px;flex-shrink:0}
.hdr-center{position:absolute;left:50%;transform:translateX(-50%);font-size:17px;font-weight:600}
.hdr-month{display:flex;align-items:center;gap:4px}
.narr{background:none;border:none;font-size:22px;color:var(--accent);padding:4px 8px;cursor:pointer;touch-action:manipulation;line-height:1}
.mlbl{font-size:15px;font-weight:600;min-width:80px;text-align:center}
.hdr-right{display:flex;align-items:center;gap:6px}
.hdr-icon-btn{background:none;border:none;font-size:22px;padding:4px 6px;cursor:pointer;touch-action:manipulation;line-height:1}
.hdr-save{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:6px 14px;font-size:14px;font-weight:600;cursor:pointer;touch-action:manipulation}

/* scroll */
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:10px 12px 0}

/* bottom nav */
.bnav{height:calc(var(--nav-h) + var(--safe-b));background:var(--card);border-top:.5px solid var(--border);display:flex;flex-shrink:0;padding-bottom:var(--safe-b)}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;touch-action:manipulation;gap:2px;padding:6px 0}
.ni-icon{font-size:22px;line-height:1}
.ni-lbl{font-size:10px;font-weight:500;color:var(--label)}
.ni.active .ni-lbl{color:var(--accent);font-weight:700}
.ni:active{opacity:.6}

/* person scroll */
.pscroll{display:flex;gap:8px;overflow-x:auto;padding:0 0 10px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.pscroll::-webkit-scrollbar{display:none}
.pcard{flex-shrink:0;border:1.5px solid var(--border);border-radius:10px;padding:8px 14px;background:var(--card);text-align:center;cursor:pointer;touch-action:manipulation;min-width:70px}
.pcard.active{background:var(--accent-bg);border-color:var(--accent)}
.pcard-name{font-size:13px;font-weight:600}
.pcard.active .pcard-name{color:var(--accent)}
.pcard-pts{font-size:13px;font-weight:700;margin-top:2px}
.pcard-pts.pos{color:var(--green)}
.pcard-pts.neg{color:var(--red)}
.pcard-pts.neu{color:var(--label)}

/* edit person pills */
.ptscroll{display:flex;gap:6px;overflow-x:auto;padding:0 0 10px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.ptscroll::-webkit-scrollbar{display:none}
.ptab{flex-shrink:0;padding:7px 14px;border-radius:20px;border:1.5px solid var(--border);cursor:pointer;font-size:13px;font-weight:500;color:#3C3C43;background:var(--card);touch-action:manipulation;display:flex;align-items:center;gap:6px}
.ptab.active{background:var(--accent-bg);border-color:var(--accent);color:var(--accent);font-weight:700}
.ptab.add{border-style:dashed;color:var(--label)}
.pdel{width:18px;height:18px;border-radius:50%;background:#FFE5E5;border:none;color:var(--red);font-size:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;touch-action:manipulation;flex-shrink:0;padding:0;line-height:1}

/* calendar */
.cal-card{background:var(--card);border-radius:12px;margin-bottom:10px;padding:8px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.chdr{text-align:center;font-size:10px;font-weight:600;color:var(--label);padding:3px 0}
.chdr.sun{color:var(--red)}
.chdr.sat{color:var(--accent)}
.vcell{border-radius:7px;padding:4px 2px 10px;min-height:60px;background:var(--card);cursor:pointer;touch-action:manipulation;position:relative;border:1.5px solid transparent}
.vcell:active{background:#F0F4FF}
.vcell.empty{pointer-events:none}
.vcell.sel{border-color:var(--accent);background:var(--accent-bg)}
.vcell.tmark{border-color:var(--accent)}
.vcell .dn{font-size:11px;font-weight:700;display:block;text-align:center;margin-bottom:2px}
.vcell.sun .dn{color:var(--red)}
.vcell.sat .dn{color:var(--accent)}
.vcell.om .dn{color:#C7C7CC}
.psr{display:flex;justify-content:space-between;font-size:9px;padding:1px 2px}
.psrn{color:#555;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:42px}
.psrv{font-weight:700}
.psrv.pos{color:var(--green)}
.psrv.neg{color:var(--red)}
.psrv.neu{color:#C7C7CC}
.tdot{width:4px;height:4px;border-radius:50%;background:var(--accent);position:absolute;bottom:2px;left:50%;transform:translateX(-50%)}

/* day sum */
.dsum{background:var(--card);border-radius:12px;margin-bottom:10px;padding:12px 14px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.dsum-t{font-size:13px;font-weight:600;color:var(--label);margin-bottom:10px}
.dsum-row{display:flex;gap:8px;flex-wrap:wrap}
.dsbox{background:var(--bg);border-radius:10px;padding:10px 12px;text-align:center;flex:1;min-width:68px}
.dsbox .dn2{font-size:11px;color:var(--label)}
.dsbox .dv{font-size:24px;font-weight:700;margin-top:2px}
.dv.pos{color:var(--green)}
.dv.neg{color:var(--red)}
.dv.neu{color:var(--label)}

/* stats bar */
.sbar{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;scrollbar-width:none}
.sbar::-webkit-scrollbar{display:none}
.sbox{background:var(--card);border-radius:10px;padding:8px 12px;text-align:center;flex-shrink:0;min-width:68px;box-shadow:0 1px 2px rgba(0,0,0,.05)}
.sbox .sl{font-size:10px;color:var(--label);font-weight:500}
.sbox .sv{font-size:20px;font-weight:700;margin-top:2px}
.sv.pos{color:var(--green)}
.sv.neg{color:var(--red)}
.sv.gold{color:#C8860A}

/* section cards */
.seccard{background:var(--card);border-radius:12px;margin-bottom:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.sechdr{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;background:#F8F8F8;border-bottom:.5px solid var(--border);gap:8px}
.secinp{border:none;background:none;font-size:14px;font-weight:700;color:#1C1C1E;flex:1;padding:0;min-width:0}
.secinp:focus{outline:none}
.secacts{display:flex;gap:6px;flex-shrink:0}
.bsm{padding:6px 11px;border-radius:8px;border:1px solid var(--border);cursor:pointer;font-size:13px;font-weight:500;background:var(--card);color:#3C3C43;touch-action:manipulation;white-space:nowrap}
.bsm.red{border-color:#FFCCCC;background:#FFF0F0;color:var(--red)}
.bsm:active{opacity:.7}
.irow{display:flex;align-items:center;padding:10px 14px;border-bottom:.5px solid var(--border);gap:8px;flex-wrap:wrap}
.irow:last-child{border-bottom:none}
.inum{font-size:11px;color:var(--label);min-width:18px;text-align:center;flex-shrink:0}
.iinp{flex:1;border:none;background:none;font-size:14px;color:#1C1C1E;padding:0;min-width:60px}
.iinp:focus{outline:none}
.sbg{display:flex;gap:3px;flex-shrink:0}
.sb{padding:7px 10px;border-radius:8px;border:1px solid var(--border);cursor:pointer;font-size:13px;font-weight:500;background:var(--card);touch-action:manipulation;line-height:1}
.sb:active{opacity:.7}
.sb.ag{background:#D4F5E5;border-color:var(--green);color:#0A6B3A;font-weight:700}
.sb.ao{background:#FFF0C0;border-color:var(--orange);color:#7A4000;font-weight:700}
.sb.ab{background:#FFD5D5;border-color:var(--red);color:#8B0000;font-weight:700}
.ipts{font-size:14px;font-weight:700;min-width:28px;text-align:right;flex-shrink:0}
.ipts.pos{color:var(--green)}
.ipts.neg{color:var(--red)}
.ipts.neu{color:var(--label)}
.bdel{padding:6px 9px;border-radius:7px;border:1px solid #FFCCCC;cursor:pointer;font-size:13px;color:var(--red);background:#FFF0F0;touch-action:manipulation;flex-shrink:0}
.bdel:active{opacity:.7}

.addsec{padding:10px 14px;text-align:center}
.addsec-btn{border:1.5px dashed #C7C7CC;border-radius:8px;background:none;color:var(--label);font-size:14px;padding:10px;width:100%;cursor:pointer;touch-action:manipulation}
.addsec-btn:active{background:var(--bg)}

.rmkinp{border:none;background:none;font-size:14px;color:#1C1C1E;width:100%;padding:12px 14px;resize:none;font-family:inherit;display:block;border-top:.5px solid var(--border)}
.rmkinp:focus{outline:none;background:#FAFAFA}

/* month stats */
.mstats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px}
.msbox{background:var(--card);border-radius:10px;padding:8px 4px;text-align:center;box-shadow:0 1px 2px rgba(0,0,0,.05)}
.msbox .sl{font-size:10px;color:var(--label)}
.msbox .sv{font-size:18px;font-weight:700;margin-top:2px}

/* reward */
.balrow{display:flex;gap:8px;margin-bottom:12px;overflow-x:auto;scrollbar-width:none}
.balrow::-webkit-scrollbar{display:none}
.balbox{background:var(--gold-bg);border:1px solid #F0D060;border-radius:10px;padding:10px 14px;text-align:center;flex-shrink:0;min-width:86px}
.ballbl{font-size:11px;color:#A07800}
.balval{font-size:22px;font-weight:700;color:#C8860A;margin-top:2px}
.balval.sp{color:var(--red)}
.balval.re{color:var(--green)}
.rwgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:10px}
.rwcard{border:1px solid #E8D080;border-radius:12px;padding:12px;background:#FFFDF0;display:flex;flex-direction:column;gap:8px}
.rwcard.ec{border-style:dashed}
.rwcname{font-size:14px;font-weight:600}
.rwccost{font-size:12px;color:#C8860A;font-weight:600}
.rwinp{border:1px solid #E0C050;border-radius:7px;font-size:13px;color:#1C1C1E;padding:6px 9px;width:100%;background:#fff}
.rwcostinp{border:1px solid #E0C050;border-radius:7px;font-size:13px;color:#C8860A;padding:6px 9px;width:100%;background:#fff;font-weight:700}
.brdm{padding:9px;border-radius:9px;border:1px solid #E0A830;background:#FFE082;color:#7A5000;font-size:13px;font-weight:700;cursor:pointer;touch-action:manipulation;width:100%}
.brdm:disabled{opacity:.35;cursor:default}
.brdm:active{opacity:.75}
.baddrw{border:1.5px dashed #E0A830;border-radius:10px;background:none;color:#A07800;font-size:14px;padding:12px;width:100%;cursor:pointer;touch-action:manipulation;margin-bottom:10px;display:block}
.baddrw:active{background:var(--gold-bg)}
.bdelrw{padding:5px 10px;border:1px solid #FFCCCC;border-radius:7px;background:#FFF0F0;color:var(--red);font-size:12px;cursor:pointer;touch-action:manipulation;width:100%}
.loglist{display:flex;flex-direction:column}
.logrow{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;border-bottom:.5px solid var(--border);background:var(--card)}
.logrow:first-child{border-radius:12px 12px 0 0}
.logrow:last-child{border-bottom:none;border-radius:0 0 12px 12px}
.loginfo{flex:1;min-width:0}
.logname{font-size:14px;font-weight:600}
.logmeta{font-size:12px;color:var(--label);margin-top:2px}
.logpts{font-size:16px;font-weight:700;color:var(--red);flex-shrink:0;margin-top:2px}
.blogdel{font-size:12px;color:var(--red);padding:4px 8px;border:1px solid #FFCCCC;border-radius:6px;background:#FFF0F0;cursor:pointer;touch-action:manipulation;flex-shrink:0;margin-top:2px}
.nolog{text-align:center;color:var(--label);font-size:14px;padding:28px 0;background:var(--card);border-radius:12px}
.seclbl{font-size:13px;font-weight:600;color:var(--label);padding:12px 2px 6px}

/* ── DIALOGS ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.48);display:flex;align-items:flex-end;justify-content:center;z-index:8000}
.overlay.mid{align-items:center}
.sheet{background:var(--card);border-radius:20px 20px 0 0;width:100%;max-height:88vh;overflow-y:auto;padding-bottom:calc(16px + var(--safe-b))}
.sheet.mid{border-radius:20px;max-width:360px;width:92%;margin:auto;padding-bottom:20px}
.shandle{width:36px;height:5px;background:#C7C7CC;border-radius:3px;margin:10px auto 0}
.stitle{font-size:17px;font-weight:700;text-align:center;padding:14px 20px 0}
.ssub{font-size:13px;color:var(--label);text-align:center;padding:4px 20px 14px;border-bottom:.5px solid var(--border)}
.sbody{padding:16px 20px}
.sfield{margin-bottom:14px}
.sflbl{font-size:13px;color:var(--label);margin-bottom:5px}
.sfinp{width:100%;border:1px solid var(--border);border-radius:10px;padding:11px 14px;font-size:16px;font-family:inherit;background:var(--bg)}
.sfinp:focus{outline:2px solid var(--accent);background:#fff}
.sfinp.pw{letter-spacing:6px;text-align:center}
.sacts{display:flex;gap:10px;margin-top:8px}
.bok{flex:1;padding:13px;border:none;border-radius:12px;background:var(--accent);color:#fff;font-size:16px;font-weight:700;cursor:pointer;touch-action:manipulation}
.bok.gold{background:var(--gold);color:#7A5000}
.bok.red{background:var(--red)}
.bcancel{flex:1;padding:13px;border:1px solid var(--border);border-radius:12px;background:var(--card);font-size:16px;cursor:pointer;touch-action:manipulation}
.pwerr{color:var(--red);font-size:13px;text-align:center;min-height:18px;margin-top:4px}

/* confirm dialog */
.confirm-box{background:var(--card);border-radius:16px;max-width:300px;width:88%;margin:auto;overflow:hidden}
.confirm-title{font-size:17px;font-weight:700;text-align:center;padding:20px 20px 6px}
.confirm-msg{font-size:14px;color:#555;text-align:center;padding:0 20px 18px}
.confirm-acts{display:flex;border-top:.5px solid var(--border)}
.confirm-btn{flex:1;padding:14px;border:none;background:none;font-size:16px;cursor:pointer;touch-action:manipulation;border-right:.5px solid var(--border)}
.confirm-btn:last-child{border-right:none}
.confirm-btn.red{color:var(--red);font-weight:700}
.confirm-btn.blue{color:var(--accent)}

.toast{position:fixed;bottom:calc(var(--nav-h) + var(--safe-b) + 14px);left:50%;transform:translateX(-50%) translateY(8px);background:rgba(28,28,30,.88);color:#fff;padding:10px 22px;border-radius:24px;font-size:14px;font-weight:500;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;z-index:9999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="app">
  <div class="hdr" id="hdr">
    <div class="hdr-month">
      <button class="narr" id="bp">‹</button>
      <span class="mlbl" id="mlbl"></span>
      <button class="narr" id="bn">›</button>
    </div>
    <span class="hdr-center">每日考核表</span>
    <div class="hdr-right">
      <button class="hdr-icon-btn" id="modeBtn" title="編輯模式">🔒</button>
      <button class="hdr-save" id="saveBtn" style="display:none">儲存</button>
    </div>
  </div>

  <div class="scroll" id="scroll">
    <div id="pageCal"></div>
    <div id="pageRw" style="display:none"></div>
  </div>

  <div class="bnav">
    <div class="ni active" id="niCal" onclick="toPage('cal')">
      <div class="ni-icon">📅</div><div class="ni-lbl">日曆考核</div>
    </div>
    <div class="ni" id="niRw" onclick="toPage('rw')">
      <div class="ni-icon">🎁</div><div class="ni-lbl">兌換獎勵</div>
    </div>
    <div class="ni" id="niToday" onclick="goToday()">
      <div class="ni-icon">📍</div><div class="ni-lbl">今天</div>
    </div>
  </div>
</div>

<!-- PW SHEET -->
<div class="overlay mid" id="pwOv" style="display:none">
  <div class="sheet mid">
    <div class="stitle">🔒 編輯模式</div>
    <div class="ssub">請輸入管理密碼</div>
    <div class="sbody">
      <div class="sfield"><div class="sflbl">密碼</div><input class="sfinp pw" type="password" id="pwInp" maxlength="20"></div>
      <div class="pwerr" id="pwErr"></div>
      <div class="sacts"><button class="bcancel" id="bPwCancel">取消</button><button class="bok" id="bPwOk">確認</button></div>
    </div>
  </div>
</div>

<!-- INPUT SHEET (通用輸入) -->
<div class="overlay mid" id="inputOv" style="display:none">
  <div class="sheet mid">
    <div class="stitle" id="inputTitle">輸入</div>
    <div class="sbody">
      <div class="sfield"><div class="sflbl" id="inputLbl">名稱</div><input class="sfinp" id="inputVal" maxlength="40"></div>
      <div class="sfield" id="inputField2" style="display:none"><div class="sflbl" id="inputLbl2">數值</div><input class="sfinp" type="number" id="inputVal2" min="1"></div>
      <div class="sacts"><button class="bcancel" id="bInputCancel">取消</button><button class="bok" id="bInputOk">確認</button></div>
    </div>
  </div>
</div>

<!-- CONFIRM SHEET -->
<div class="overlay mid" id="confirmOv" style="display:none">
  <div class="confirm-box">
    <div class="confirm-title" id="confirmTitle">確認</div>
    <div class="confirm-msg" id="confirmMsg"></div>
    <div class="confirm-acts">
      <button class="confirm-btn blue" id="bConfirmCancel">取消</button>
      <button class="confirm-btn red" id="bConfirmOk">確定刪除</button>
    </div>
  </div>
</div>

<!-- REDEEM SHEET -->
<div class="overlay" id="rdmOv" style="display:none">
  <div class="sheet">
    <div class="shandle"></div>
    <div class="stitle" id="rdmTitle">兌換獎勵</div>
    <div class="ssub" id="rdmSub"></div>
    <div class="sbody">
      <div class="sfield"><div class="sflbl">備註（選填）</div><input class="sfinp" id="rdmNote" maxlength="60" placeholder="例：本週表現優秀"></div>
      <div class="sfield"><div class="sflbl">數量</div><input class="sfinp" type="number" id="rdmQty" value="1" min="1" max="99"></div>
      <div class="sacts"><button class="bcancel" id="bRdmCancel">取消</button><button class="bok gold" id="bRdmOk">確認兌換</button></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var PW='121823694';
var SC={good:2,ok:1,bad:-1,none:0};
var MONTHS=['一','二','三','四','五','六','七','八','九','十','十一','十二'];
var WDAYS=['日','一','二','三','四','五','六'];
var today=new Date();
var Y=today.getFullYear(),M=today.getMonth(),D=today.getDate();
var curP=0,editMode=false,curPage='cal',pendingRi=-1;
var inputCb=null, confirmCb=null;

var state={
  persons:[{id:'p0',name:'員工甲'}],
  data:{},
  rewards:[
    {id:'r0',name:'提早下班30分鐘',cost:10},
    {id:'r1',name:'午餐補貼一次',cost:8},
    {id:'r2',name:'假日補休一天',cost:20}
  ],
  redeemLogs:{}
};

// utils
function uid(){return Math.random().toString(36).slice(2,8)}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function mLbl(m){return MONTHS[m]+'月'}
function dKey(p,y,m,d){return p+'_'+y+'_'+m+'_'+d}
function pid(){return state.persons[curP].id}
function dim(y,m){return new Date(y,m+1,0).getDate()}
function fdow(y,m){return new Date(y,m,1).getDay()}

function defaultSections(){
  return[
    {id:uid(),name:'工作績效',items:[{id:uid(),name:'任務完成率',score:'none'},{id:uid(),name:'工作品質',score:'none'},{id:uid(),name:'進度掌控',score:'none'}]},
    {id:uid(),name:'工作態度',items:[{id:uid(),name:'出勤狀況',score:'none'},{id:uid(),name:'積極主動',score:'none'}]},
    {id:uid(),name:'團隊合作',items:[{id:uid(),name:'溝通協調',score:'none'},{id:uid(),name:'協助同事',score:'none'}]}
  ];
}
function getDayData(p,y,m,d){
  var k=dKey(p,y,m,d);
  if(!state.data[k])state.data[k]={sections:defaultSections(),remark:''};
  return state.data[k];
}
function hasDayData(p,y,m,d){return !!state.data[dKey(p,y,m,d)]}
function calcScore(p,y,m,d){
  if(!hasDayData(p,y,m,d))return null;
  var t=0,s=0;
  (state.data[dKey(p,y,m,d)].sections||[]).forEach(function(sec){
    (sec.items||[]).forEach(function(it){if(it.score&&it.score!=='none'){s++;t+=SC[it.score]||0;}});
  });
  return{total:t,scored:s};
}
function curDD(){return getDayData(pid(),Y,M,D)}
function totalEarned(p){
  var t=0;
  Object.keys(state.data).forEach(function(k){
    if(k.indexOf(p+'_')!==0)return;
    (state.data[k].sections||[]).forEach(function(s){(s.items||[]).forEach(function(it){if(it.score&&it.score!=='none')t+=SC[it.score]||0;});});
  });
  return t;
}
function totalSpent(p){return(state.redeemLogs[p]||[]).reduce(function(a,l){return a+l.cost*l.qty;},0);}
function balance(p){return totalEarned(p)-totalSpent(p);}

// save/load
function saveAll(){
  var ta=document.getElementById('rmkTA');if(ta)curDD().remark=ta.value;
  try{localStorage.setItem('dpr_app2',JSON.stringify(state));showToast('已儲存 ✓');}
  catch(e){showToast('儲存失敗');}
}
function loadSaved(){
  try{var s=localStorage.getItem('dpr_app2');if(s)state=JSON.parse(s);}catch(e){}
  if(!state.rewards)state.rewards=[];
  if(!state.redeemLogs)state.redeemLogs={};
  Object.keys(state.data||{}).forEach(function(k){
    (state.data[k].sections||[]).forEach(function(sec){(sec.items||[]).forEach(function(it){if(!it.score)it.score='none';});});
  });
}
function showToast(msg){
  var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');

}

// ══ CAL PAGE ══════════════════════════════════════════
function renderCal(){
  var el=document.getElementById('pageCal');el.innerHTML='';

  // edit person tabs
  if(editMode){
    var pt='<div class="ptscroll">';
    state.persons.forEach(function(ps,i){
      pt+='<div class="ptab'+(i===curP?' active':'')+'" data-pi="'+i+'">'
        +esc(ps.name)
        +(state.persons.length>1?'<button class="pdel" data-deli="'+i+'">✕</button>':'')
        +'</div>';
    });
    pt+='<div class="ptab add" id="bAddP">＋ 新增</div></div>';
    el.innerHTML+=pt;
  }

  // person cards
  var pc='<div class="pscroll">';
  state.persons.forEach(function(ps,i){
    var c=calcScore(ps.id,Y,M,D);
    var v=c&&c.scored>0?((c.total>0?'+':'')+c.total+'分'):'—';
    var cls=c&&c.scored>0?(c.total>0?'pos':c.total<0?'neg':'neu'):'neu';
    pc+='<div class="pcard'+(i===curP?' active':'')+'" data-pi="'+i+'"><div class="pcard-name">'+esc(ps.name)+'</div><div class="pcard-pts '+cls+'">'+v+'</div></div>';
  });
  pc+='</div>';

  // calendar
  var fd=fdow(Y,M),dm=dim(Y,M),pd=dim(Y,M-1<0?11:M-1);
  var cal='<div class="cal-card"><div class="cgrid">'+calHdrs();
  for(var i=0;i<fd;i++)cal+='<div class="vcell empty om"><span class="dn">'+(pd-fd+1+i)+'</span></div>';
  for(var d=1;d<=dm;d++){
    var dow=(fd+d-1)%7,cls2='vcell'+(dow===0?' sun':dow===6?' sat':'');
    if(d===D)cls2+=' sel';
    var isT=d===today.getDate()&&M===today.getMonth()&&Y===today.getFullYear();
    if(isT&&d!==D)cls2+=' tmark';
    var rows='';
    state.persons.forEach(function(ps){
      var c=calcScore(ps.id,Y,M,d);
      var v=c&&c.scored>0?((c.total>0?'+':'')+c.total):'—';
      var vc=c&&c.scored>0?(c.total>0?'pos':c.total<0?'neg':'neu'):'neu';
      rows+='<div class="psr"><span class="psrn">'+esc(ps.name)+'</span><span class="psrv '+vc+'">'+v+'</span></div>';
    });
    cal+='<div class="'+cls2+'" data-d="'+d+'"><span class="dn">'+d+'</span>'+rows+(isT?'<div class="tdot"></div>':'')+'</div>';
  }
  var rem=(7-((fd+dm)%7))%7;
  for(var j=1;j<=rem;j++)cal+='<div class="vcell empty om"><span class="dn">'+j+'</span></div>';
  cal+='</div></div>';

  // day sum
  var ds='<div class="dsum"><div class="dsum-t">'+Y+'年'+mLbl(M)+D+'日</div><div class="dsum-row">';
  state.persons.forEach(function(ps){
    var c=calcScore(ps.id,Y,M,D);
    var v=c&&c.scored>0?((c.total>0?'+':'')+c.total):'—';
    var vc=c&&c.scored>0?(c.total>0?'pos':c.total<0?'neg':'neu'):'neu';
    ds+='<div class="dsbox"><div class="dn2">'+esc(ps.name)+'</div><div class="dv '+vc+'">'+v+'</div></div>';
  });
  ds+='</div></div>';

  el.innerHTML+=(editMode?'':'')+pc+cal+ds;

  if(editMode)el.innerHTML+=buildEditDetail();

  // bind cal clicks
  el.querySelectorAll('.vcell[data-d]').forEach(function(c){
    c.addEventListener('click',function(){
      var ta=document.getElementById('rmkTA');if(ta)curDD().remark=ta.value;
      D=parseInt(this.getAttribute('data-d'));renderCal();
    });
  });
  el.querySelectorAll('.pcard[data-pi]').forEach(function(c){
    c.addEventListener('click',function(){curP=parseInt(this.getAttribute('data-pi'));renderCal();});
  });
  if(editMode){
    el.querySelectorAll('.ptab[data-pi]').forEach(function(c){
      c.addEventListener('click',function(e){if(e.target.classList.contains('pdel'))return;curP=parseInt(this.getAttribute('data-pi'));renderCal();});
      c.addEventListener('dblclick',function(e){if(!e.target.classList.contains('pdel'))renamePerson(parseInt(this.getAttribute('data-pi')));});
    });
    el.querySelectorAll('.pdel').forEach(function(c){
      c.addEventListener('click',function(e){e.stopPropagation();
        var i=parseInt(this.getAttribute('data-deli'));
        if(state.persons.length<=1){showToast('至少保留一位人員');return;}
        delPerson(i);
      });
    });
    var bap=document.getElementById('bAddP');
    if(bap)bap.addEventListener('click',addPerson);
    bindEditDetail(el);
  }
}

function buildEditDetail(){
  var ps=pid(),dd=curDD(),total=0,scored=0;
  (dd.sections||[]).forEach(function(s){(s.items||[]).forEach(function(it){if(it.score&&it.score!=='none'){scored++;total+=SC[it.score]||0;}});});
  var tcls=total>0?'pos':total<0?'neg':'neu';
  var earned=totalEarned(ps),spent=totalSpent(ps),bal=balance(ps);

  var stats='<div class="sbar">'+
    '<div class="sbox"><div class="sl">今日</div><div class="sv '+tcls+'">'+(total>0?'+':'')+total+'</div></div>'+
    '<div class="sbox"><div class="sl">累積</div><div class="sv gold">'+earned+'</div></div>'+
    '<div class="sbox"><div class="sl">已兌</div><div class="sv neg">-'+spent+'</div></div>'+
    '<div class="sbox"><div class="sl">餘額</div><div class="sv '+(bal>=0?'pos':'neg')+'">'+bal+'</div></div>'+
  '</div>';

  var shtml='';
  (dd.sections||[]).forEach(function(sec,si){
    var ihtml='';
    (sec.items||[]).forEach(function(it,ii){
      var sc=it.score||'none',pts=sc!=='none'?((SC[sc]>0?'+':'')+SC[sc]+'分'):'—';
      var pcls=sc==='good'?'pos':sc==='bad'?'neg':'neu';
      ihtml+='<div class="irow"><span class="inum">'+(ii+1)+'</span>'+
        '<input class="iinp" value="'+esc(it.name)+'" data-si="'+si+'" data-ii="'+ii+'" />'+
        '<div class="sbg">'+
          '<button class="sb'+(sc==='good'?' ag':'')+'" data-sc="good" data-si="'+si+'" data-ii="'+ii+'">好</button>'+
          '<button class="sb'+(sc==='ok'?' ao':'')+'" data-sc="ok" data-si="'+si+'" data-ii="'+ii+'">尚可</button>'+
          '<button class="sb'+(sc==='bad'?' ab':'')+'" data-sc="bad" data-si="'+si+'" data-ii="'+ii+'">不好</button>'+
        '</div>'+
        '<span class="ipts '+pcls+'">'+pts+'</span>'+
        '<button class="bdel" data-si="'+si+'" data-ii="'+ii+'">刪</button>'+
      '</div>';
    });
    shtml+='<div class="seccard"><div class="sechdr">'+
      '<input class="secinp" value="'+esc(sec.name)+'" data-si="'+si+'" />'+
      '<div class="secacts"><button class="bsm" data-ai="'+si+'">＋項目</button><button class="bsm red" data-ds="'+si+'">刪類別</button></div>'+
    '</div>'+ihtml+'</div>';
  });

  var addsec='<div class="addsec"><button class="addsec-btn" id="bAddSec">＋ 新增考核類別</button></div>';
  var rmk='<div class="seccard"><textarea class="rmkinp" id="rmkTA" rows="3" placeholder="當日備註…">'+esc(dd.remark||'')+'</textarea></div>';

  var dmv=dim(Y,M),mf=0,mp=0,mn=0,mt=0;
  for(var md=1;md<=dmv;md++){var c=calcScore(ps,Y,M,md);if(c&&c.scored>0){mf++;mt+=c.total;if(c.total>0)mp++;else if(c.total<0)mn++;}}
  var ms='<div class="seclbl">本月統計</div><div class="mstats">'+
    '<div class="msbox"><div class="sl">已填天</div><div class="sv">'+mf+'</div></div>'+
    '<div class="msbox"><div class="sl">正分天</div><div class="sv pos">'+mp+'</div></div>'+
    '<div class="msbox"><div class="sl">負分天</div><div class="sv '+(mn>0?'neg':'')+'">'+mn+'</div></div>'+
    '<div class="msbox"><div class="sl">月累分</div><div class="sv '+(mt>0?'pos':mt<0?'neg':'')+'">'+(mt>0?'+':'')+mt+'</div></div>'+
  '</div>';

  return'<div class="seclbl">'+Y+'年'+mLbl(M)+D+'日　考核記錄</div>'+stats+shtml+addsec+rmk+ms+'<div style="height:16px"></div>';
}

      var rw=state.rewards[pendingRi];
      document.getElementById('rdmTitle').textContent='兌換：'+rw.name;
      document.getElementById('rdmSub').textContent='每次扣 '+rw.cost+' 分 ｜ 目前餘額 '+balance(pid())+' 分';
      document.getElementById('rdmNote').value='';document.getElementById('rdmQty').value='1';
      document.getElementById('rdmOv').style.display='flex';
    });
  });
  el.querySelectorAll('.blogdel').forEach(function(c){
    c.addEventListener('click',function(){
      var li=parseInt(this.getAttribute('data-li'));
      var log=(state.redeemLogs[ps]||[])[li];
      if(!log)return;
      showConfirm('撤銷兌換','確定撤銷「'+log.rewardName+'」的兌換記錄？',function(){state.redeemLogs[ps].splice(li,1);saveAll();renderRw();});
    });
  });
}

// redeem modal
document.getElementById('bRdmCancel').addEventListener('click',function(){document.getElementById('rdmOv').style.display='none';});
document.getElementById('bRdmOk').addEventListener('click',function(){
  if(pendingRi<0||pendingRi>=state.rewards.length)return;
  var rw=state.rewards[pendingRi];
  var qty=parseInt(document.getElementById('rdmQty').value)||1;
  var note=document.getElementById('rdmNote').value.trim();
  var need=rw.cost*qty,bal=balance(pid());
  if(need>bal){showToast('點數不足！餘額 '+bal+' 需要 '+need);return;}
  var ps=pid();
  if(!state.redeemLogs[ps])state.redeemLogs[ps]=[];
  var now=new Date();
  state.redeemLogs[ps].push({id:'l'+uid(),rewardName:rw.name,cost:rw.cost,qty:qty,note:note,
    date:now.getFullYear()+'/'+(now.getMonth()+1)+'/'+now.getDate()});
  document.getElementById('rdmOv').style.display='none';
  saveAll();showToast('已兌換「'+rw.name+'」扣除 '+need+' 分');renderRw();
});

loadSaved();render();
</script>
</body>
</html>
